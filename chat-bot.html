<div
  class="dashboard-container"
  (mousedown)="onResizeStart($event)"
  [style.width.px]="panelWidth"
  [style.height.px]="panelHeight"
  [style.max-width.%]="95"
  [style.max-height.%]="95"
  [style.cursor]="resizing ? 'nwse-resize' : 'default'"
  [style.user-select]="resizing ? 'none' : 'auto'"
  style="display:flex; flex-direction:column; overflow:hidden;">

  <div
    class="scale-layer"
    [style.transform]="'scale(' + panelScale + ')'"
    [style.width.%]="inverseScaleWidthPercent"
    [style.height.%]="inverseScaleHeightPercent"
    style="transform-origin: top left; display:flex; flex-direction:column; height:100%; min-height:0;">

    <button mat-icon-button class="close-btn" (click)="onCloseClicked()" aria-label="Close detail view">
      <mat-icon>close</mat-icon>
    </button>

    <div class="chat-wrapper" style="display:flex; flex-direction:column; flex:1; overflow:hidden; min-height:0;">
      <h3 style="margin: 0 0 8px 0;">Ask a question</h3>

      <div style="font-size: 12px; color: #667; margin-bottom: 8px;">
        Drag anywhere on this panel to resize.
      </div>

      <div class="chat-messages" style="flex:1; overflow-y:auto; min-height:0;">
        <div *ngFor="let msg of chatMessages"
             [ngClass]="{'user-msg': msg.isUser, 'bot-msg': !msg.isUser}">
          {{ msg.text }}
        </div>
      </div>

      <div class="chat-input-area" style="display:flex; align-items:flex-end; margin-top:10px; gap:8px;">
        <textarea matInput
                  [(ngModel)]="question"
                  rows="1"
                  placeholder="Type your question..."
                  class="chat-input"
                  style="flex:1; min-height:40px; max-height:140px; resize:vertical;">
        </textarea>

        <button mat-button
                color="primary"
                (click)="sendQuestion()"
                [disabled]="!question.trim()"
                class="chat-send-btn">
          Send
        </button>
      </div>
    </div>
  </div>
</div>
